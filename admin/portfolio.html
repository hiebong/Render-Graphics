<!DOCTYPE html>
<html>
<head>
<title>Portfolio Manager</title>
<link rel="stylesheet" href="admin.css">
</head>

<body>

<script>
if(sessionStorage.getItem("adminLoggedIn") !== "true"){
window.location.href="login.html";
}

function logout(){
sessionStorage.removeItem("adminLoggedIn");
window.location.href="login.html";
}
</script>

<nav>
<h2>Render Graphics Admin</h2>

<div>
<a href="dashboard.html">Dashboard</a>
<a href="portfolio.html">Portfolio</a>
<a href="services.html">Services</a>
<a href="#" onclick="logout()">Logout</a>
</div>
</nav>

<section class="page">

<h1>Portfolio Manager</h1>

<h3>Upload New Artwork</h3>

<form id="portfolioForm" enctype="multipart/form-data">

<input type="text" name="title" placeholder="Artwork Title" required>

<select name="category">
<option>Pet Portrait</option>
<option>Graphic Design</option>
</select>

<input type="file" name="image" required>

<button type="submit">Upload Artwork</button>

</form>

<hr>

<h3>Uploaded Artworks</h3>

<div id="portfolioList"></div>

</section>

<script>

const form = document.getElementById("portfolioForm");

form.addEventListener("submit", async function(e){

  e.preventDefault();

  const formData = new FormData(form);

  const res = await fetch("/api/portfolio",{
    method:"POST",
    body:formData
  });

  const data = await res.json();

  alert(data.message);

  form.reset();

  loadPortfolio();

});

async function loadPortfolio(){

  const res = await fetch("/api/portfolio");
  const items = await res.json();

  const container = document.getElementById("portfolioList");

  container.innerHTML="";

  items.forEach(item => {
    container.innerHTML += `
      <div class="portfolio-item">

        <img src="/portfolio_images/${item.image}">
        <h4>${item.title}</h4>
        <p>${item.category}</p>

        <button onclick="deleteItem(${item.id})">
          Delete
        </button>

      </div>
    `;
  });

}

/* 🔥 FIXED DELETE FUNCTION (OUTSIDE) */
async function deleteItem(id){

  const confirmDelete = confirm("Delete this item?");
  if(!confirmDelete) return;

  await fetch(`/api/portfolio/${id}`, {
    method: "DELETE"
  });

  alert("Deleted!");

  loadPortfolio();
}

loadPortfolio();

</script>

</body>
</html>
