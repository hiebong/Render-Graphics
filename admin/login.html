<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; }
    form { display: flex; flex-direction: column; width: 300px; }
    input, button { margin: 10px 0; padding: 10px; font-size: 16px; }
  </style>
</head>
<body>

  <form id="loginForm">
    <h2>Admin Login</h2>
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
<script>
function logout(){
sessionStorage.removeItem("adminLoggedIn");
window.location.href = "login.html";
}
</script>
  <script>
    const form = document.getElementById("loginForm");
    form.addEventListener("submit", function(e){
      e.preventDefault();

      const username = form.username.value;
      const password = form.password.value;

      // Simple hardcoded login for now
      if(username === "hiebong" && password === "Render!"){
        // Save login in sessionStorage
        sessionStorage.setItem("adminLoggedIn", "true");
        window.location.href = "dashboard.html";
      } else {
        alert("Invalid username or password");
      }
    });

    // If already logged in, redirect to dashboard
    if(sessionStorage.getItem("adminLoggedIn") === "true"){
      window.location.href = "dashboard.html";
    }
  
  </script>

</body>
</html>
