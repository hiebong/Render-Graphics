<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
  <link rel="icon" type="image/png" href="logo/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Jost', sans-serif;
      background: #ddd6cc;
      overflow-x: hidden;
      position: relative;
      padding: 20px;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    
    .blob-1 {
      width: 320px; height: 320px;
      top: -80px; left: 50%; transform: translateX(-50%);
      background: radial-gradient(circle at 35% 35%, #f5f0e8, #c8bfb2);
    }
    
    .blob-2 {
      width: 260px; height: 260px;
      top: 30%; left: -60px;
      background: radial-gradient(circle at 35% 35%, #f2ede5, #c6bdb0);
    }
    
    .blob-3 {
      width: 220px; height: 220px;
      top: 10%; right: -40px;
      background: radial-gradient(circle at 35% 35%, #f3ede6, #c9c0b3);
    }
    
    .blob-4 {
      width: 300px; height: 300px;
      bottom: -80px; left: 50%; transform: translateX(-50%);
      background: radial-gradient(circle at 35% 35%, #f0ebe3, #c4bbb0);
    }
    
    .blob-5 {
      width: 180px; height: 180px;
      bottom: 15%; right: 3%;
      background: radial-gradient(circle at 35% 35%, #f1ece4, #c5bcb0);
    }

    .card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 380px;
      padding: 52px 44px 44px;
      background: rgba(235, 228, 218, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-bottom-color: rgba(255, 255, 255, 0.15);
      border-right-color: rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow:
        inset 0 1.5px 0 rgba(255, 255, 255, 0.6),
        0 4px 16px rgba(130, 110, 90, 0.06),
        0 20px 48px rgba(110, 90, 70, 0.1);
      transition: all 0.3s ease;
    }

    .card h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 30px;
      letter-spacing: 0.28em;
      text-align: center;
      color: #5a4f44;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .field { margin-bottom: 22px; }

    .field label {
      display: block;
      font-size: 10.5px;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #8a7e72;
      margin-bottom: 9px;
    }

    .input-wrap { position: relative; }

    .input-wrap input {
      width: 100%;
      height: 46px;
      padding: 0 46px 0 20px;
      background: rgba(255, 252, 247, 0.62);
      border: 0.5px solid rgba(190, 175, 158, 0.45);
      border-radius: 50px;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 300;
      color: #4e4438;
      outline: none;
      transition: border-color 0.22s, background 0.22s;
      -webkit-appearance: none;
      appearance: none;
    }

    .input-wrap input:focus {
      border-color: rgba(160, 140, 118, 0.65);
      background: rgba(255, 253, 249, 0.8);
    }

    .input-wrap input::placeholder {
      color: #b8aa9a;
      font-size: 12px;
    }

    .eye-btn {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: #a8998a;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }

    .eye-btn:hover { color: #6b5f52; }
    .eye-btn:active { transform: translateY(-50%) scale(0.95); }

    .forgot {
      display: block;
      text-align: center;
      margin-top: 4px;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: #8a7e72;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Jost', sans-serif;
      padding: 0;
      width: 100%;
      transition: color 0.2s;
    }

    .forgot:hover { color: #4e4438; }
    .forgot:active { transform: scale(0.98); }

    .submit-btn {
      width: 100%;
      height: 50px;
      margin-top: 28px;
      border-radius: 50px;
      background: rgba(255, 252, 247, 0.72);
      border: 0.5px solid rgba(190, 175, 158, 0.5);
      font-family: 'Jost', sans-serif;
      font-size: 11.5px;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #5a4f44;
      cursor: pointer;
      transition: background 0.22s, color 0.18s, transform 0.1s;
    }

    .submit-btn:hover {
      background: rgba(255, 254, 251, 0.92);
      color: #3e342c;
    }

    .submit-btn:active { transform: scale(0.985); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      display: none;
      text-align: center;
      font-size: 11.5px;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: #a05a4a;
      margin-top: 14px;
      padding: 8px 12px;
      background: rgba(160, 90, 74, 0.08);
      border-radius: 12px;
      border: 0.5px solid rgba(160, 90, 74, 0.2);
    }

    .error-msg.show { display: block; }

    /* ============================================ */
    /* RESPONSIVE DESIGN */
    /* ============================================ */

    /* Tablet (768px and below) */
    @media (max-width: 768px) {
      body {
        padding: 20px;
      }
      
      .card {
        max-width: 360px;
        padding: 44px 36px 40px;
      }
      
      .card h1 {
        font-size: 28px;
        letter-spacing: 0.24em;
        margin-bottom: 36px;
      }
      
      .field {
        margin-bottom: 20px;
      }
      
      .input-wrap input {
        height: 44px;
        font-size: 12px;
      }
      
      .submit-btn {
        height: 48px;
        margin-top: 26px;
        font-size: 11px;
      }
    }

    /* Mobile Landscape (600px and below) */
    @media (max-width: 600px) {
      body {
        padding: 16px;
      }
      
      .card {
        max-width: 340px;
        padding: 40px 32px 36px;
      }
      
      .card h1 {
        font-size: 26px;
        letter-spacing: 0.22em;
        margin-bottom: 32px;
      }
      
      .field label {
        font-size: 10px;
        margin-bottom: 7px;
      }
      
      .input-wrap input {
        height: 42px;
        padding: 0 42px 0 18px;
        font-size: 12px;
      }
      
      .eye-btn {
        right: 12px;
      }
      
      .eye-btn svg {
        width: 14px;
        height: 14px;
      }
      
      .submit-btn {
        height: 46px;
        margin-top: 24px;
        font-size: 10.5px;
        letter-spacing: 0.24em;
      }
      
      .error-msg {
        font-size: 11px;
        margin-top: 12px;
      }
    }

    /* Mobile Portrait (480px and below) */
    @media (max-width: 480px) {
      body {
        padding: 12px;
      }
      
      .card {
        max-width: 100%;
        padding: 36px 28px 32px;
      }
      
      .card h1 {
        font-size: 24px;
        letter-spacing: 0.2em;
        margin-bottom: 28px;
      }
      
      .field {
        margin-bottom: 18px;
      }
      
      .field label {
        font-size: 9.5px;
        margin-bottom: 6px;
      }
      
      .input-wrap input {
        height: 40px;
        padding: 0 38px 0 16px;
        font-size: 11px;
      }
      
      .eye-btn {
        right: 12px;
      }
      
      .eye-btn svg {
        width: 13px;
        height: 13px;
      }
      
      .forgot {
        font-size: 10px;
        margin-top: 2px;
      }
      
      .submit-btn {
        height: 44px;
        margin-top: 22px;
        font-size: 10px;
        letter-spacing: 0.22em;
      }
      
      .error-msg {
        font-size: 10.5px;
        padding: 6px 10px;
      }
    }

    /* Small Mobile (375px and below) */
    @media (max-width: 375px) {
      .card {
        padding: 32px 24px 28px;
      }
      
      .card h1 {
        font-size: 22px;
        letter-spacing: 0.18em;
        margin-bottom: 24px;
      }
      
      .input-wrap input {
        height: 38px;
        font-size: 10px;
      }
      
      .submit-btn {
        height: 42px;
        font-size: 9.5px;
      }
    }

    /* Landscape orientation optimization */
    @media (max-height: 600px) and (orientation: landscape) {
      body {
        padding: 20px;
        align-items: flex-start;
        padding-top: 40px;
      }
      
      .card {
        padding: 30px 36px;
      }
      
      .card h1 {
        font-size: 24px;
        margin-bottom: 24px;
      }
      
      .field {
        margin-bottom: 16px;
      }
      
      .submit-btn {
        margin-top: 20px;
      }
    }

    /* High-resolution screens (Retina) */
    @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
      .card {
        border-width: 0.5px;
      }
    }

    /* Touch-friendly improvements */
    @media (hover: none) and (pointer: coarse) {
      .eye-btn,
      .forgot,
      .submit-btn {
        cursor: default;
      }
      
      .eye-btn:active {
        transform: translateY(-50%) scale(0.95);
      }
      
      .submit-btn:active {
        transform: scale(0.98);
      }
      
      .forgot:active {
        transform: scale(0.98);
      }
      
      .input-wrap input {
        font-size: 16px; /* Prevents zoom on iOS */
      }
    }

    /* Reduce motion for accessibility */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Smooth focus outline for accessibility */
    :focus-visible {
      outline: 2px solid var(--accent, #a07858);
      outline-offset: 2px;
      border-radius: 50px;
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
  <div class="blob blob-5"></div>

  <div class="card">
    <h1>Login</h1>

    <form id="loginForm" novalidate>

      <div class="field">
        <label for="email">Email</label>
        <div class="input-wrap">
          <input type="email" id="email" name="email" required autocomplete="email" placeholder="admin@example.com">
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">
          <button type="button" class="eye-btn" id="togglePw" aria-label="Toggle password">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="button" class="forgot" onclick="window.location.href='forgot-password.html'">
        Forgot password?
      </button>

      <button type="submit" class="submit-btn" id="submitBtn">Sign in</button>

      <p class="error-msg" id="errorMsg"></p>

    </form>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCuP5W68lIQuoETBf5PrEQG8AJo2eU4ezU",
      authDomain: "render-graphics.firebaseapp.com",
      projectId: "render-graphics",
      storageBucket: "render-graphics.firebasestorage.app",
      messagingSenderId: "348022591762",
      appId: "1:348022591762:web:efcac1875b11ae1c17a3cb"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // If already logged in, go straight to dashboard
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = "admin-dashboard.html";
    });

    // Eye toggle
    document.getElementById("togglePw").addEventListener("click", function () {
      const pw = document.getElementById("password");
      const isHidden = pw.type === "password";
      pw.type = isHidden ? "text" : "password";
      this.innerHTML = isHidden
        ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
           </svg>`
        : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
           </svg>`;
    });

    // Sign in
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const btn      = document.getElementById("submitBtn");
      const errorMsg = document.getElementById("errorMsg");

      // Client-side validation
      if (!email || !password) {
        errorMsg.textContent = "Please fill in all fields.";
        errorMsg.classList.add("show");
        return;
      }

      if (!email.includes('@') || !email.includes('.')) {
        errorMsg.textContent = "Please enter a valid email address.";
        errorMsg.classList.add("show");
        return;
      }

      errorMsg.classList.remove("show");
      btn.textContent = "Signing in...";
      btn.disabled = true;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "admin-dashboard.html";
      } catch (err) {
        const messages = {
          "auth/invalid-email":        "Invalid email address.",
          "auth/user-not-found":       "No account found with this email.",
          "auth/wrong-password":       "Incorrect password.",
          "auth/invalid-credential":   "Incorrect email or password.",
          "auth/too-many-requests":    "Too many attempts. Try again later.",
          "auth/network-request-failed": "Network error. Please check your connection."
        };
        errorMsg.textContent = messages[err.code] || "Login failed. Please try again.";
        errorMsg.classList.add("show");
      } finally {
        btn.textContent = "Sign in";
        btn.disabled = false;
      }
    });

    // Add input validation on blur for better UX
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    
    emailInput.addEventListener("blur", () => {
      const email = emailInput.value.trim();
      const errorMsg = document.getElementById("errorMsg");
      if (email && (!email.includes('@') || !email.includes('.'))) {
        errorMsg.textContent = "Please enter a valid email address.";
        errorMsg.classList.add("show");
      } else if (errorMsg.textContent === "Please enter a valid email address.") {
        errorMsg.classList.remove("show");
      }
    });
    
    passwordInput.addEventListener("blur", () => {
      const password = passwordInput.value;
      const errorMsg = document.getElementById("errorMsg");
      if (password && password.length < 6) {
        errorMsg.textContent = "Password must be at least 6 characters.";
        errorMsg.classList.add("show");
      } else if (errorMsg.textContent === "Password must be at least 6 characters.") {
        errorMsg.classList.remove("show");
      }
    });
  </script>

</body>
</html>
