<!DOCTYPE html>
<html>
<head>
<title>Services | Render Graphics</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800&family=Montserrat:ital@1&display=swap" rel="stylesheet">
</head>

<body>

<nav class="nav-overlay">

  <a href="index.html" class="nav-pill">HOME</a>

  <div class="nav-right">
    <a href="portfolio.html" class="nav-pill">PORTFOLIO</a>
    <a href="services.html" class="nav-pill">SERVICES</a>
    <a href="about.html" class="nav-pill">ABOUT</a>

    <div class="dropdown">
      <a href="#" class="nav-pill dropdown-btn">ORDER ▾</a>

      <div class="dropdown-menu">
        <a href="order.html">Place Order</a>
        <a href="track.html">Check Order Status</a>
      </div>
    </div>
  </div>

</nav>

<section class="page">

<h1>Services</h1>

<div id="servicesContainer" class="services"></div>

</section>

<script>

async function loadServices(){

const res = await fetch("/api/services");

const services = await res.json();

const container = document.getElementById("servicesContainer");

container.innerHTML="";

services.forEach(service => {

container.innerHTML += `

<div class="service-card">

<h3>${service.title}</h3>

<p>${service.description}</p>

<p class="price">Starting at ${service.price}</p>

<button onclick="addService('${service.title}')">Order Now</button>

</div>

`;

});

}

function addService(service){

let cart = JSON.parse(localStorage.getItem("orderCart")) || [];

const existing = cart.find(item => item.service === service);

if(existing){
existing.quantity++;
}else{
cart.push({
service: service,
quantity: 1
});
}

localStorage.setItem("orderCart", JSON.stringify(cart));

window.location.href = "order.html";

}

loadServices();

</script>
<script>
document.querySelectorAll(".dropdown-btn").forEach(btn => {
  btn.addEventListener("click", function(e){
    e.stopPropagation();
    const menu = this.nextElementSibling;
    menu.style.display = menu.style.display === "block" ? "none" : "block";
  });
});

document.addEventListener("click", () => {
  document.querySelectorAll(".dropdown-menu").forEach(menu => {
    menu.style.display = "none";
  });
});
</script>
</body>
</html>
