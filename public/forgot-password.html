<!DOCTYPE html>
<html>
<head>
  <title>Forgot Password</title>
  <link rel="icon" type="image/png" href="logo/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Jost', sans-serif;
      background: #ddd6cc;
      overflow-x: hidden;
      position: relative;
      padding: 20px;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    
    .blob-1 {
      width: 320px; height: 320px;
      top: -80px; left: 50%; transform: translateX(-50%);
      background: radial-gradient(circle at 35% 35%, #f5f0e8, #c8bfb2);
    }
    
    .blob-2 {
      width: 260px; height: 260px;
      top: 30%; left: -60px;
      background: radial-gradient(circle at 35% 35%, #f2ede5, #c6bdb0);
    }
    
    .blob-3 {
      width: 220px; height: 220px;
      top: 10%; right: -40px;
      background: radial-gradient(circle at 35% 35%, #f3ede6, #c9c0b3);
    }
    
    .blob-4 {
      width: 300px; height: 300px;
      bottom: -80px; left: 50%; transform: translateX(-50%);
      background: radial-gradient(circle at 35% 35%, #f0ebe3, #c4bbb0);
    }
    
    .blob-5 {
      width: 180px; height: 180px;
      bottom: 15%; right: 3%;
      background: radial-gradient(circle at 35% 35%, #f1ece4, #c5bcb0);
    }

    .card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 380px;
      padding: 52px 44px 44px;
      background: rgba(235, 228, 218, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-bottom-color: rgba(255, 255, 255, 0.15);
      border-right-color: rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow:
        inset 0 1.5px 0 rgba(255, 255, 255, 0.6),
        0 4px 16px rgba(130, 110, 90, 0.06),
        0 20px 48px rgba(110, 90, 70, 0.1);
      transition: all 0.3s ease;
    }

    .step { display: none; }
    .step.active { display: block; }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 28px;
      letter-spacing: 0.25em;
      text-align: center;
      color: #5a4f44;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: #8a7e72;
      text-align: center;
      line-height: 1.8;
      margin-bottom: 32px;
      word-break: break-word;
    }

    .field { margin-bottom: 22px; }

    .field label {
      display: block;
      font-size: 10.5px;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #8a7e72;
      margin-bottom: 9px;
    }

    .field input {
      width: 100%;
      height: 46px;
      padding: 0 20px;
      background: rgba(255, 252, 247, 0.62);
      border: 0.5px solid rgba(190, 175, 158, 0.45);
      border-radius: 50px;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 300;
      color: #4e4438;
      outline: none;
      transition: border-color 0.22s, background 0.22s;
      -webkit-appearance: none;
      appearance: none;
    }

    .field input:focus {
      border-color: rgba(160, 140, 118, 0.65);
      background: rgba(255, 253, 249, 0.8);
    }

    .field input::placeholder {
      color: #b8aa9a;
      font-size: 12px;
    }

    .primary-btn {
      width: 100%;
      height: 50px;
      margin-top: 8px;
      border-radius: 50px;
      background: rgba(255, 252, 247, 0.72);
      border: 0.5px solid rgba(190, 175, 158, 0.5);
      font-family: 'Jost', sans-serif;
      font-size: 11.5px;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #5a4f44;
      cursor: pointer;
      transition: background 0.22s, color 0.18s, transform 0.1s;
    }

    .primary-btn:hover {
      background: rgba(255, 254, 251, 0.92);
      color: #3e342c;
    }

    .primary-btn:active { transform: scale(0.985); }
    .primary-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 18px;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: #8a7e72;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Jost', sans-serif;
      padding: 0;
      width: 100%;
      transition: color 0.2s;
    }

    .back-link:hover { color: #4e4438; }
    .back-link:active { transform: scale(0.98); }

    .msg {
      display: none;
      text-align: center;
      font-size: 11.5px;
      font-weight: 300;
      letter-spacing: 0.06em;
      margin-top: 14px;
      padding: 8px 12px;
      border-radius: 12px;
    }

    .msg.show { display: block; }
    .msg.error { 
      color: #a05a4a;
      background: rgba(160, 90, 74, 0.08);
      border: 0.5px solid rgba(160, 90, 74, 0.2);
    }
    .msg.success { 
      color: #6a8060;
      background: rgba(106, 128, 96, 0.08);
      border: 0.5px solid rgba(106, 128, 96, 0.2);
    }

    .check-circle {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255, 252, 247, 0.7);
      border: 0.5px solid rgba(190, 175, 158, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    /* ============================================ */
    /* RESPONSIVE DESIGN */
    /* ============================================ */

    /* Tablet (768px and below) */
    @media (max-width: 768px) {
      body {
        padding: 20px;
      }
      
      .card {
        max-width: 360px;
        padding: 44px 36px 40px;
      }
      
      h1 {
        font-size: 26px;
        letter-spacing: 0.22em;
      }
      
      .subtitle {
        font-size: 10.5px;
        margin-bottom: 28px;
      }
      
      .field {
        margin-bottom: 20px;
      }
      
      .field input {
        height: 44px;
        font-size: 12px;
      }
      
      .primary-btn {
        height: 48px;
        font-size: 11px;
        letter-spacing: 0.24em;
      }
      
      .check-circle {
        width: 52px;
        height: 52px;
        margin-bottom: 20px;
      }
      
      .check-circle svg {
        width: 20px;
        height: 20px;
      }
    }

    /* Mobile Landscape (600px and below) */
    @media (max-width: 600px) {
      body {
        padding: 16px;
      }
      
      .card {
        max-width: 340px;
        padding: 40px 32px 36px;
      }
      
      h1 {
        font-size: 24px;
        letter-spacing: 0.2em;
        margin-bottom: 8px;
      }
      
      .subtitle {
        font-size: 10px;
        margin-bottom: 24px;
        line-height: 1.6;
      }
      
      .field {
        margin-bottom: 18px;
      }
      
      .field label {
        font-size: 10px;
        margin-bottom: 7px;
      }
      
      .field input {
        height: 42px;
        font-size: 12px;
      }
      
      .primary-btn {
        height: 46px;
        margin-top: 6px;
        font-size: 10.5px;
        letter-spacing: 0.22em;
      }
      
      .back-link {
        margin-top: 16px;
        font-size: 10px;
      }
      
      .msg {
        font-size: 11px;
        margin-top: 12px;
        padding: 6px 10px;
      }
      
      .check-circle {
        width: 48px;
        height: 48px;
        margin-bottom: 18px;
      }
      
      .check-circle svg {
        width: 18px;
        height: 18px;
      }
    }

    /* Mobile Portrait (480px and below) */
    @media (max-width: 480px) {
      body {
        padding: 12px;
      }
      
      .card {
        max-width: 100%;
        padding: 36px 28px 32px;
      }
      
      h1 {
        font-size: 22px;
        letter-spacing: 0.18em;
        margin-bottom: 6px;
      }
      
      .subtitle {
        font-size: 9.5px;
        margin-bottom: 22px;
      }
      
      .field {
        margin-bottom: 16px;
      }
      
      .field label {
        font-size: 9.5px;
        margin-bottom: 6px;
      }
      
      .field input {
        height: 40px;
        padding: 0 16px;
        font-size: 11px;
      }
      
      .primary-btn {
        height: 44px;
        font-size: 10px;
        letter-spacing: 0.2em;
      }
      
      .back-link {
        margin-top: 14px;
        font-size: 9.5px;
      }
      
      .msg {
        font-size: 10.5px;
        padding: 5px 8px;
      }
      
      .check-circle {
        width: 44px;
        height: 44px;
        margin-bottom: 16px;
      }
      
      .check-circle svg {
        width: 16px;
        height: 16px;
      }
    }

    /* Small Mobile (375px and below) */
    @media (max-width: 375px) {
      .card {
        padding: 32px 24px 28px;
      }
      
      h1 {
        font-size: 20px;
        letter-spacing: 0.16em;
      }
      
      .subtitle {
        font-size: 9px;
        margin-bottom: 20px;
      }
      
      .field input {
        height: 38px;
        font-size: 10px;
      }
      
      .primary-btn {
        height: 42px;
        font-size: 9.5px;
      }
    }

    /* Landscape orientation optimization */
    @media (max-height: 600px) and (orientation: landscape) {
      body {
        padding: 20px;
        align-items: flex-start;
        padding-top: 40px;
      }
      
      .card {
        padding: 30px 36px;
      }
      
      h1 {
        font-size: 22px;
        margin-bottom: 8px;
      }
      
      .subtitle {
        margin-bottom: 20px;
      }
      
      .field {
        margin-bottom: 14px;
      }
      
      .field input {
        height: 38px;
      }
      
      .primary-btn {
        margin-top: 4px;
        height: 42px;
      }
      
      .check-circle {
        width: 44px;
        height: 44px;
        margin-bottom: 16px;
      }
    }

    /* High-resolution screens (Retina) */
    @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
      .card {
        border-width: 0.5px;
      }
    }

    /* Touch-friendly improvements */
    @media (hover: none) and (pointer: coarse) {
      .primary-btn,
      .back-link {
        cursor: default;
      }
      
      .primary-btn:active {
        transform: scale(0.98);
      }
      
      .back-link:active {
        transform: scale(0.98);
      }
      
      .field input {
        font-size: 16px; /* Prevents zoom on iOS */
      }
    }

    /* Reduce motion for accessibility */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Smooth focus outline for accessibility */
    :focus-visible {
      outline: 2px solid #a07858;
      outline-offset: 2px;
      border-radius: 50px;
    }

    /* Email masking word break */
    .subtitle strong {
      display: inline-block;
      word-break: break-all;
      max-width: 100%;
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
  <div class="blob blob-5"></div>

  <div class="card">

    <!-- Step 1: Enter email -->
    <div class="step active" id="step1">
      <h1>Reset</h1>
      <p class="subtitle">
        Enter the email address linked to your account.<br>
        We'll send you a password reset link.
      </p>

      <div class="field">
        <label for="emailInput">Email address</label>
        <input type="email" id="emailInput" autocomplete="email" placeholder="admin@example.com">
      </div>

      <p class="msg error" id="emailError"></p>

      <button class="primary-btn" id="sendBtn">Send Reset Link</button>
      <button class="back-link" onclick="window.location.href='login.html'">← Back to login</button>
    </div>

    <!-- Step 2: Email sent confirmation -->
    <div class="step" id="step2">
      <div class="check-circle">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
          stroke="#6a8060" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h1>Check your email</h1>
      <p class="subtitle" id="sentSubtitle">
        We sent a password reset link to your email.<br>
        Click the link in the email to set a new password.<br><br>
        <span style="color: #a8998a; font-size: 10.5px;">Didn't receive it? Check your spam folder.</span>
      </p>

      <button class="primary-btn" id="resendBtn">Resend Email</button>
      <button class="back-link" onclick="window.location.href='login.html'">← Back to login</button>

      <p class="msg success" id="resentMsg">Reset email sent again.</p>
      <p class="msg error" id="resendError"></p>
    </div>

  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, sendPasswordResetEmail, fetchSignInMethodsForEmail }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCuP5W68lIQuoETBf5PrEQG8AJo2eU4ezU",
      authDomain: "render-graphics.firebaseapp.com",
      projectId: "render-graphics",
      storageBucket: "render-graphics.firebasestorage.app",
      messagingSenderId: "348022591762",
      appId: "1:348022591762:web:efcac1875b11ae1c17a3cb"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let userEmail = "";

    function goTo(step) {
      document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
      document.getElementById("step" + step).classList.add("active");
    }

    // Send reset link
    document.getElementById("sendBtn").addEventListener("click", async () => {
      const email  = document.getElementById("emailInput").value.trim();
      const err    = document.getEletById("emailError");
      const btn    = document.getElementId("sendBtn");

      err.classList.remove("show");

      // Email validation
      if (!email) {
        err.textContent = "Please enter your email address.";
        err.classList.add("show");
        return;
      }
      
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        err.textContent = "Please enter a valid email address.";
        err.classList.add("show");
        return;
      }

      btn.textContent = "Sending...";
      btn.disabled = true;

      try {
        // Check if email is registered
        const methods = await fetchSignInMethodsForEmail(auth, email);

        if (methods.length === 0) {
          err.textContent = "This email is not registered.";
          err.classList.add("show");
          btn.textContent = "Send Reset Link";
          btn.disabled = false;
          return;
        }

        await sendPasswordResetEmail(auth, email);
        userEmail = email;

        // Show masked email in subtitle with better word breaking
        const maskEmail = (email) => {
          const [local, domain] = email.split('@');
          if (local.length <= 2) return email;
          const maskedLocal = local[0] + '*'.repeat(Math.min(local.length - 2, 8)) + local[local.length - 1];
          return `${maskedLocal}@${domain}`;
        };
        
        const masked = maskEmail(email);
        document.getElementById("sentSubtitle").innerHTML = `
          We sent a password reset link to <strong style="font-weight:400; color:#5a4f44; word-break:break-all;">${masked}</strong>.<br>
          Click the link in the email to set a new password.<br><br>
          <span style="color: #a8998a; font-size: 10.5px;">Didn't receive it? Check your spam folder.</span>
        `;

        goTo(2);

      } catch (e) {
        console.error(e);
        const messages = {
          "auth/user-not-found":  "No account found with this email.",
          "auth/invalid-email":   "Invalid email address.",
          "auth/too-many-requests": "Too many attempts. Please wait and try again.",
          "auth/network-request-failed": "Network error. Please check your connection."
        };
        err.textContent = messages[e.code] || "Something went wrong. Please try again.";
        err.classList.add("show");
      } finally {
        btn.textContent = "Send Reset Link";
        btn.disabled = false;
      }
    });

    // Resend
    document.getElementById("resendBtn").addEventListener("click", async () => {
      const btn        = document.getElementById("resendBtn");
      const resentMsg  = document.getElementById("resentMsg");
      const resendErr  = document.getElementById("resendError");

      resentMsg.classList.remove("show");
      resendErr.classList.remove("show");
      btn.textContent = "Sending...";
      btn.disabled = true;

      try {
        await sendPasswordResetEmail(auth, userEmail);
        resentMsg.classList.add("show");
        setTimeout(() => resentMsg.classList.remove("show"), 5000);
      } catch (e) {
        resendErr.textContent = "Failed to resend. Please try again.";
        resendErr.classList.add("show");
        setTimeout(() => resendErr.classList.remove("show"), 5000);
      } finally {
        btn.textContent = "Resend Email";
        btn.disabled = false;
      }
    });

    // Add input validation on blur for better UX
    const emailInput = document.getElementById("emailInput");
    const emailError = document.getElementById("emailError");
    
    emailInput.addEventListener("blur", () => {
      const email = emailInput.value.trim();
      if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        emailError.textContent = "Please enter a valid email address.";
        emailError.classList.add("show");
      } else if (emailError.textContent === "Please enter a valid email address.") {
        emailError.classList.remove("show");
      }
    });
    
    emailInput.addEventListener("focus", () => {
      emailError.classList.remove("show");
    });
  </script>

</body>
</html>
